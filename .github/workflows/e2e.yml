name: e2e

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: e2e (Airflow ${{ matrix.airflow-version }})
    runs-on: ubuntu-latest # needs Docker + compose v2 (not on ubuntu-slim)
    permissions:
      contents: read # checkout only
    strategy:
      fail-fast: false
      matrix:
        # Exercise both compat branches under a REAL Airflow. The provider is
        # installed under each release's official constraints inside the image.
        include:
          - airflow-version: "2.11.0"
            python-version: "3.12"
          - airflow-version: "3.0.3"
            python-version: "3.12"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Identical entrypoint to local dev: `docker compose run --rm e2e`. The
      # image builds the provider into the official Airflow image, parses the
      # example DAGs through the real scheduler, and runs tests/e2e.
      - name: Run e2e suite in Docker
        working-directory: tests/e2e
        env:
          AIRFLOW_VERSION: ${{ matrix.airflow-version }}
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: docker compose run --rm --build e2e

  all-pass:
    name: All e2e versions passed
    runs-on: ubuntu-slim
    needs: [e2e]
    if: always()
    steps:
      - uses: lowlydba/are-we-good@bb8ee9e793e4233fac1992bb880e2a28bed7f42f # v1.0.3
        with:
          jobs: ${{ toJson(needs) }}
