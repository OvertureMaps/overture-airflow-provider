name: test

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-slim
    permissions:
      contents: read  # checkout only
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: uv python install "$PYTHON_VERSION"

      - name: Sync dev environment
        run: uv sync --all-extras --group dev

      - name: Run pytest
        run: uv run pytest -v

  pytest-airflow2:
    name: pytest (Airflow 2.11)
    runs-on: ubuntu-slim
    permissions:
      contents: read  # checkout only
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      # The committed lock pins Airflow 3.x. This leg instead pins Airflow 2.11
      # via Airflow's official constraints so the 2.x compat branch (which
      # downstream consumers run) is exercised. 2.11 supports Python 3.9-3.12,
      # so it runs on 3.12. ruff is intentionally omitted (lint has its own
      # workflow, and the 2.11 constraints pin ruff<0.6); only the test runners
      # are installed, unconstrained, on top of the constrained runtime.
      - name: Create Airflow 2.11 environment
        run: |
          uv venv --python 3.12
          uv pip install -e ".[all]" "apache-airflow==2.11.*" \
            --constraint https://raw.githubusercontent.com/apache/airflow/constraints-2.11.0/constraints-3.12.txt
          uv pip install "pytest>=8.0" "pytest-mock>=3.12"

      - name: Run pytest
        run: .venv/bin/pytest -v

  e2e:
    name: e2e (Airflow ${{ matrix.airflow-version }})
    runs-on: ubuntu-latest  # needs Docker + compose v2 (not on ubuntu-slim)
    permissions:
      contents: read  # checkout only
    strategy:
      fail-fast: false
      matrix:
        include:
          - airflow-version: "2.11.0"
            python-version: "3.12"
          - airflow-version: "3.0.3"
            python-version: "3.12"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run e2e suite in Docker
        working-directory: tests/e2e
        env:
          AIRFLOW_VERSION: ${{ matrix.airflow-version }}
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: docker compose run --rm --build e2e

  all-pass:
    name: All tests passed
    runs-on: ubuntu-slim
    needs: [pytest, pytest-airflow2, e2e]
    if: always()
    steps:
      - uses: lowlydba/are-we-good@bb8ee9e793e4233fac1992bb880e2a28bed7f42f # v1.0.3
        with:
          jobs: ${{ toJson(needs) }}
